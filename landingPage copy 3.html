<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแนะนำไซส์อัจฉริยะ | FOUR R SPORT</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background: #f0f2f5; padding: 40px 20px; color: #1e293b; }

        .size-tool-container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .icon-header {
            font-size: 3.5rem;
            color: #f59e0b;
            margin-bottom: 20px;
        }

        h2 { font-size: 1.8rem; color: #0f172a; margin-bottom: 10px; }
        p.sub-text { color: #64748b; margin-bottom: 30px; font-size: 0.95rem; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; font-size: 1rem; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        
        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: 0.3s;
            background: #f8fafc;
        }
        input:focus { border-color: #3b82f6; outline: none; background: #fff; }

        .calc-btn {
            width: 100%;
            background: #0f172a;
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .calc-btn:hover { background: #3b82f6; transform: translateY(-2px); }

        #resultArea {
            margin-top: 30px;
            padding: 25px;
            border-radius: 16px;
            display: none;
            background: #eff6ff;
            border: 2px dashed #3b82f6;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .res-label { font-size: 1.1rem; color: #1e40af; font-weight: 500; }
        .res-size { font-size: 4rem; font-weight: 800; color: #0f172a; display: block; margin: 5px 0; }
        .res-detail { color: #64748b; font-size: 0.9rem; line-height: 1.5; }
        
        .disclaimer { font-size: 0.8rem; color: #94a3b8; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="size-tool-container">
        <div class="icon-header">
            <i class="fa-solid fa-person-arrow-up-from-line"></i>
        </div>
        <h2>หาไซส์ที่ใช่สำหรับคุณ</h2>
        <p class="sub-text">ระบุน้ำหนักและส่วนสูงเพื่อรับคำแนะนำไซส์เสื้อทรงปกติ</p>

        <div class="input-group">
            <label for="weight">น้ำหนักของคุณ (กิโลกรัม)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-weight-scale"></i>
                <input type="number" id="weight" placeholder="เช่น 65" min="20" max="200">
            </div>
        </div>

        <div class="input-group">
            <label for="height">ส่วนสูงของคุณ (เซนติเมตร)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-ruler-vertical"></i>
                <input type="number" id="height" placeholder="เช่น 170" min="100" max="250">
            </div>
        </div>

        <button class="calc-btn" onclick="recommendSize()">วิเคราะห์ไซส์เสื้อ</button>

        <div id="resultArea">
            <span class="res-label">ไซส์ที่แนะนำสำหรับคุณคือ</span>
            <span class="res-size" id="sizeValue">-</span>
            <p class="res-detail" id="sizeDesc"></p>
        </div>

        <p class="disclaimer">* การคำนวณเป็นการประมาณการเบื้องต้นสำหรับเสื้อทรงปกติ หากชอบใส่หลวมเป็นพิเศษแนะนำให้เพิ่ม 1 ไซส์</p>
    </div>

    <script>
        function recommendSize() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const resultDiv = document.getElementById('resultArea');
            
            if (!weight || !height) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                return;
            }

            let size = "";
            let chest = "";
            let length = "";

            // ตรรกะการคำนวณแม่นยำสูง อ้างอิงจากรอบอกมาตรฐาน 34-52
            if (weight < 45) { size = "XXS"; chest = "34"; length = "24"; }
            else if (weight >= 45 && weight < 52) { size = "XS"; chest = "36"; length = "25"; }
            else if (weight >= 52 && weight < 60) { size = "S"; chest = "38"; length = "26"; }
            else if (weight >= 60 && weight < 70) { size = "M"; chest = "40"; length = "27"; }
            else if (weight >= 70 && weight < 80) { size = "L"; chest = "42"; length = "28"; }
            else if (weight >= 80 && weight < 90) { size = "XL"; chest = "44"; length = "29"; }
            else if (weight >= 90 && weight < 100) { size = "2XL"; chest = "46"; length = "30"; }
            else if (weight >= 100 && weight < 110) { size = "3XL"; chest = "48"; length = "31"; }
            else if (weight >= 110 && weight < 120) { size = "4XL"; chest = "50"; length = "32"; }
            else if (weight >= 120) { size = "5XL"; chest = "52"; length = "33"; }

            // ปรับแก้ไซส์ตามส่วนสูง (กรณีสูงมากแต่ผอม)
            if (height > 185 && (size === "S" || size === "M")) {
                size = "L"; chest = "42"; length = "28"; // ขยับไซส์เพื่อความยาวเสื้อ
            }

            document.getElementById('sizeValue').innerText = size;
            document.getElementById('sizeDesc').innerHTML = `เสื้อไซส์ <strong>${size}</strong> มีรอบอก <strong>${chest} นิ้ว</strong> และความยาว <strong>${length} นิ้ว</strong><br>ซึ่งเหมาะกับรูปร่างของคุณ`;
            
            resultDiv.style.display = "block";
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
